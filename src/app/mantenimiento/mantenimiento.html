<mat-card class="form-container">

  <h2>Registro de Mantenimiento</h2>

  <form [formGroup]="mantenimientoForm" (ngSubmit)="guardar()">

    <!-- SECCIÓN 1 -->
    <h3>Datos de Origen</h3>

    <div class="grid-2">
      <mat-form-field appearance="outline">
        <mat-label>Usuario</mat-label>
        <input matInput formControlName="usuario" placeholder="Ej: Juan Pérez">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>ID / Cédula</mat-label>
        <input matInput formControlName="cedula">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Ubicación</mat-label>
      <mat-select formControlName="ubicacion">
        <mat-option value="Aula 101">Aula 101</mat-option>
        <mat-option value="Laboratorio A">Laboratorio A</mat-option>
        <mat-option value="Administración">Administración</mat-option>
        <mat-option value="Biblioteca">Biblioteca</mat-option>
      </mat-select>
    </mat-form-field>

    <label class="section-label">Prioridad</label>
    <mat-radio-group formControlName="prioridad"  class="radio-group">
        <mat-radio-button value="Baja" class="radio-baja"> Baja </mat-radio-button>
        <mat-radio-button value="Media" class="radio-media"> Media </mat-radio-button>
        <mat-radio-button value="Alta" class="radio-alta"> Alta </mat-radio-button>
    </mat-radio-group>

    <!-- SECCIÓN 2 -->
    <h3>Categorización Técnica</h3>

    <mat-radio-group formControlName="tipomantenimiento" class="radio-group">
      <mat-radio-button value="Preventivo">Preventivo</mat-radio-button>
      <mat-radio-button value="Correctivo">Correctivo</mat-radio-button>
      <mat-radio-button value="Actualizacion">Actualización</mat-radio-button>
      <mat-radio-button value="Redes">Redes / Conectividad</mat-radio-button>
    </mat-radio-group>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Equipo afectado</mat-label>
      <input matInput formControlName="equipo" placeholder="Ej: Impresora HP, Laptop #15">
    </mat-form-field>

    <!-- SECCIÓN 3 -->
    <h3>Detalle del Mantenimiento</h3>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Asunto</mat-label>
      <input matInput formControlName="asunto">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Descripción detallada</mat-label>
      <textarea matInput rows="5" formControlName="descripcion"></textarea>
    </mat-form-field>

    <div class="file-upload">
      <label>Adjuntar evidencia (Imagen / Documento)</label>
      <input type="file" (change)="onFileSelected($event)">
    </div>

    <div class="button-container">
      <button mat-raised-button class="btnform" type="submit" [disabled]="mantenimientoForm.invalid">
        <mat-icon>build</mat-icon>
        Registrar Mantenimiento
      </button>
    </div>

  </form>
</mat-card>
